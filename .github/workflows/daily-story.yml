name: Daily story

on:
  schedule:
    # 06:10 UTC every day (~07:10–08:10 Berlin). Cron can drift a few minutes.
    - cron: '10 6 * * *'
  workflow_dispatch: # allow manual "Run workflow" from the Actions tab

permissions:
  contents: write # needed to commit the generated story back to main

concurrency:
  group: daily-story
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Generate today's story
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-daily.mjs
      - name: Commit new story
        run: |
          if [ -n "$(git status --porcelain src/stories)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/stories
            git commit -m "Daily story: $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No new story to commit."
          fi
